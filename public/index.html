<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Productos</title>
</head>
<body>

<h2>PRODUCTOS</h2>

<input type="text" id="busqueda" placeholder="Buscar...">
<button onclick="buscar()">Buscar</button>
<button onclick="limpiar()">Limpiar</button>

<p id="mensaje"></p>

<table border="1">
    <thead>
        <tr>
            <th>NOMBRE</th>
            <th>DESCRIPCION</th>
            <th>CATEGORIA</th>
            <th>PRECIO</th>
            <th>STOCK</th>
        </tr>
    </thead>
    <tbody id="tabla">
    </tbody>
</table>

<script>
const API = "http://localhost:4000/api/productos";

async function cargarProductos() {
    const res = await fetch(API + "/verProductos");
    const data = await res.json();
    mostrarTabla(data);
}

async function buscar() {
    const texto = document.getElementById("busqueda").value;
    const mensaje = document.getElementById("mensaje");

    if (!texto) return;

    mensaje.textContent = "Buscando...";

    const res = await fetch(API + "/buscar/" + texto);
    const data = await res.json();

    if (data.length === 0) {
        mensaje.textContent = "No se encontraron productos con '" + texto + "'";
        document.getElementById("tabla").innerHTML = "";
    } else {
        mensaje.textContent = "";
        mostrarTabla(data);
    }
}

function limpiar() {
    document.getElementById("busqueda").value = "";
    document.getElementById("mensaje").textContent = "";
    cargarProductos();
}

function mostrarTabla(productos) {
    const tabla = document.getElementById("tabla");
    tabla.innerHTML = "";

    productos.forEach(p => {
        const fila = `
            <tr>
                <td>${p.nombre}</td>
                <td>${p.descripcion}</td>
                <td>${p.categoria}</td>
                <td>${p.precio}</td>
                <td>${p.stock}</td>
            </tr>
        `;
        tabla.innerHTML += fila;
    });
}

cargarProductos();
</script>

</body>
</html>
